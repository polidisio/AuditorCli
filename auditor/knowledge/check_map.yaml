# AuditorCli check → skill mapping
# mitre_id here takes precedence over what's in the skill's frontmatter.
# remediation_override: if set, used as-is; if null, derived from the skill's
#   ## Workflow / ## Detection and OPSEC Notes / ## Validation Criteria section.

