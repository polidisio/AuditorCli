  remediation_override: "Disable TLS ≤1.1, SSLv3, weak ciphers. Enable TLS 1.3. Use ECDHE cipher suites. Renew certificates before expiry."

WEB-HDR-MISSING:
  skill: null
  mitre_id: null
  remediation_override: null

WEB-REDIRECT-GENERIC:
  skill: null
  mitre_id: T1557
  remediation_override: "Configure HTTP (port 80) to return 301 redirect to https://. Enforce HSTS."
